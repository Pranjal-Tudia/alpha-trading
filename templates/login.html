<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ALPHA TRADER</title>
    <!-- Fonts and FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --bg-color: #050505;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Mesh */
        .bg-mesh {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.12), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.12), transparent 30%);
            z-index: 0;
            animation: breathe 8s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Glassmorphism Container */
        .auth-container {
            position: relative;
            z-index: 1;
            background: rgba(18, 18, 24, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo i {
            -webkit-text-fill-color: #00f2fe;
        }

        .auth-container h2 { 
            font-family: 'Outfit', sans-serif; 
            font-size: 2.2rem; 
            margin-bottom: 0.5rem; 
            color: #ffffff; 
            font-weight: 700;
        }
        .auth-container p { 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 2.5rem; 
            font-size: 1rem;
        }

        .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }
        
        .input-group {
            position: relative;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            transition: 0.3s ease;
            z-index: 2;
        }

        .auth-form input { 
            width: 100%;
            padding: 1.1rem 1rem 1.1rem 3.2rem; 
            border-radius: 12px; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            font-size: 1rem; 
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }
        
        .auth-form input:focus { 
            outline: none; 
            border-color: #4facfe; 
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.15);
        }

        .auth-form input:focus + i, .auth-form input:focus ~ i {
            color: #4facfe;
        }

        .auth-btn { 
            margin-top: 0.5rem;
            padding: 1.1rem; 
            border-radius: 12px; 
            background: var(--brand-gradient); 
            color: white; 
            font-weight: 700; 
            font-size: 1.1rem; 
            border: none; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
            position: relative;
            overflow: hidden;
        }

        .auth-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }
        
        .auth-btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4);
        }

        .auth-btn:hover::after {
            left: 150%;
        }
        
        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-links { 
            margin-top: 2rem; 
            font-size: 0.95rem; 
            color: rgba(255,255,255,0.6);
        }
        .auth-links a { 
            color: #4facfe; 
            text-decoration: none; 
            font-weight: 600;
            transition: 0.2s ease;
        }
        .auth-links a:hover {
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .flash { 
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #fca5a5; 
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem; 
            margin-bottom: 1.5rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-container {
                padding: 2.5rem 1.5rem;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                border: none;
                background: rgba(18, 18, 24, 0.9);
            }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="auth-container">
        <div class="logo">
            <i class="fas fa-layer-group"></i>
            <span>ALPHA TRADER</span>
        </div>
        
        <h2>Welcome Back</h2>
        <p>Sign in to your intelligent trading terminal</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form class="auth-form" method="POST" action="{{ url_for('login') }}">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
                <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
                <i class="fas fa-lock"></i>
            </div>
            <button type="submit" class="auth-btn">Access Terminal</button>
        </form>
        <div class="auth-links">
            <p>Don't have a paper wallet? <a href="{{ url_for('register') }}">Create one</a></p>
        </div>
    </div>
</body>
</html>
