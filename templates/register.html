<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ALPHA TRADER</title>
    <!-- Fonts and FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- tsParticles -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-preset-triangles@2/tsparticles.preset.triangles.bundle.min.js"></script>
    <style>
        :root {
            --brand-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --glow-color: rgba(16, 185, 129, 0.3);
            --bg-color: #000000; /* Pure Black Background */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #tsparticles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Glassmorphism Container */
        .auth-container {
            position: relative;
            z-index: 1;
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo i {
            -webkit-text-fill-color: #10b981;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .auth-container h2 { 
            font-family: 'Outfit', sans-serif; 
            font-size: 2.2rem; 
            margin-bottom: 0.5rem; 
            color: #ffffff; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .auth-container p { 
            color: rgba(255,255,255,0.5); 
            margin-bottom: 2.5rem; 
            font-size: 0.95rem;
        }

        .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }
        
        .input-group {
            position: relative;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            transition: 0.3s ease;
            z-index: 2;
        }

        .auth-form input { 
            width: 100%;
            padding: 1.1rem 1rem 1.1rem 3.2rem; 
            border-radius: 14px; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.05); 
            color: white; 
            font-size: 1rem; 
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }
        
        .auth-form input:focus { 
            outline: none; 
            border-color: #10b981; 
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .auth-form input:focus + i, .auth-form input:focus ~ i {
            color: #10b981;
        }

        .auth-btn { 
            margin-top: 1rem;
            padding: 1.1rem; 
            border-radius: 14px; 
            background: var(--brand-gradient); 
            color: #000; 
            font-weight: 700; 
            font-size: 1.1rem; 
            border: none; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px var(--glow-color);
            position: relative;
            overflow: hidden;
        }

        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .auth-btn:hover { 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.5);
            color: #fff;
        }

        .auth-btn:hover::before {
            opacity: 1;
        }
        
        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-links { 
            margin-top: 2rem; 
            font-size: 0.95rem; 
            color: rgba(255,255,255,0.4);
        }
        .auth-links a { 
            color: #10b981; 
            text-decoration: none; 
            font-weight: 600;
            transition: 0.2s ease;
        }
        .auth-links a:hover {
            color: #34d399;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.8);
        }

        .flash { 
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
            color: #fca5a5; 
            padding: 0.8rem;
            border-radius: 10px;
            font-size: 0.9rem; 
            margin-bottom: 1.5rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-container {
                padding: 2.5rem 1.5rem;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                border: none;
                background: rgba(0, 0, 0, 0.8);
                backdrop-filter: blur(10px);
            }
        }
    </style>
</head>
<body>
    <div id="tsparticles"></div>
    <div class="auth-container">
        <div class="logo">
            <i class="fas fa-layer-group"></i>
            <span>ALPHA TRADER</span>
        </div>
        
        <h2>Create Account</h2>
        <p>Start your journey with a $100,000 Paper Wallet</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form class="auth-form" method="POST" action="{{ url_for('register') }}">
            <div class="input-group">
                <input type="text" name="username" placeholder="Choose a Username" required>
                <i class="fas fa-user-plus"></i>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Secure Password" required>
                <i class="fas fa-shield-alt"></i>
            </div>
            <button type="submit" class="auth-btn">Create Free Wallet</button>
        </form>
        <div class="auth-links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Log in here</a></p>
        </div>
    </div>

    <script>
        tsParticles.load("tsparticles", {
            preset: "triangles",
            background: {
                color: "#000000"
            },
            particles: {
                color: { value: "#10b981" },
                links: { color: "#34d399", opacity: 0.2, distance: 150 },
                move: { speed: 1.5 },
                size: { value: 2 },
                opacity: { value: 0.5 }
            },
            interactivity: {
                events: {
                    onHover: { enable: true, mode: "grab" },
                    onClick: { enable: true, mode: "push" }
                },
                modes: {
                    grab: { distance: 200, links: { opacity: 0.8 } }
                }
            }
        });
    </script>
</body>
</html>
