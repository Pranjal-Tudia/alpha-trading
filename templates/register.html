<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Elite Trader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-color); }
        .auth-container { background: #0d0d12; border: 1px solid var(--border-color); border-radius: 16px; padding: 3rem; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .auth-container h2 { font-family: 'Outfit'; font-size: 2rem; margin-bottom: 0.5rem; color: white; }
        .auth-container p { color: var(--text-secondary); margin-bottom: 2rem; }
        .auth-form { display: flex; flex-direction: column; gap: 1rem; }
        .auth-form input { padding: 1rem; border-radius: 8px; background: #111; border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1rem; }
        .auth-form input:focus { outline: none; border-color: #10b981; }
        .auth-btn { padding: 1rem; border-radius: 8px; background: #10b981; color: black; font-weight: 600; font-size: 1rem; border: none; cursor: pointer; transition: 0.2s; }
        .auth-btn:hover { background: #059669; }
        .auth-links { margin-top: 1.5rem; font-size: 0.9rem; }
        .auth-links a { color: #10b981; text-decoration: none; }
        .flash { color: #f87171; font-size: 0.9rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Create Account</h2>
        <p>Start with a $100,000 Paper Wallet</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form class="auth-form" method="POST" action="{{ url_for('register') }}">
            <input type="text" name="username" placeholder="Choose a Username" required>
            <input type="password" name="password" placeholder="Choose a Password" required>
            <button type="submit" class="auth-btn">Register</button>
        </form>
        <div class="auth-links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
        </div>
    </div>
</body>
</html>
